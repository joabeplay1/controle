<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Arcade Cyberpunk - Playable</title>
    <script src="https://cdn.jsdelivr.net/npm/jsnes@latest/dist/jsnes.min.js"></script>
    <style>
        /* [MANTIVE TODO SEU CSS ORIGINAL AQUI PARA ECONOMIZAR ESPAÇO] */
        /* Certifique-se de manter seu CSS original intacto dentro desta tag style */
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #nes-canvas { width: 100%; height: 100%; object-fit: contain; }
        .screen { display: none; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>
<body>

    <div id="app">
        <div id="game-launch-screen" class="screen">
            <h1 id="launching-game-name">JOGANDO...</h1>
            <canvas id="nes-canvas" width="256" height="240"></canvas>
            <p>Pressione ESC para sair.</p>
        </div>
        
        </div>

    <script>
        // --- Lógica do Emulador e Controle ---
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        
        const nes = new jsnes.NES({
            onFrame: function(buffer) {
                const imageData = ctx.createImageData(256, 240);
                for (let i = 0; i < buffer.length; i++) {
                    imageData.data[i * 4] = (buffer[i] >> 16) & 0xFF;
                    imageData.data[i * 4 + 1] = (buffer[i] >> 8) & 0xFF;
                    imageData.data[i * 4 + 2] = buffer[i] & 0xFF;
                    imageData.data[i * 4 + 3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            }
        });

        // Loop de renderização
        function frame() {
            nes.frame();
            requestAnimationFrame(frame);
        }

        // Mapeamento DualShock
        function updateGamepad() {
            const gp = navigator.getGamepads()[0];
            if (gp) {
                // Mapeamento NES: 1 = Player 1
                if (gp.buttons[1].pressed) nes.buttonDown(1, jsnes.Controller.BUTTON_A);
                else nes.buttonUp(1, jsnes.Controller.BUTTON_A);
                
                if (gp.buttons[0].pressed) nes.buttonDown(1, jsnes.Controller.BUTTON_B);
                else nes.buttonUp(1, jsnes.Controller.BUTTON_B);

                if (gp.buttons[12].pressed) nes.buttonDown(1, jsnes.Controller.BUTTON_UP);
                else nes.buttonUp(1, jsnes.Controller.BUTTON_UP);
                
                if (gp.buttons[13].pressed) nes.buttonDown(1, jsnes.Controller.BUTTON_DOWN);
                else nes.buttonUp(1, jsnes.Controller.BUTTON_DOWN);
            }
            requestAnimationFrame(updateGamepad);
        }

        // Função de carregar jogo
        async function loadGame(romUrl) {
            const response = await fetch(romUrl);
            const romData = await response.arrayBuffer();
            nes.loadROM(romData);
            requestAnimationFrame(frame);
            updateGamepad();
        }

        // --- Substitua seu antigo playGameButton.addEventListener por isto ---
        playGameButton.addEventListener('click', () => {
            if (selectedGame) {
                showScreen('game-launch-screen');
                // IMPORTANTE: Insira aqui a URL de uma ROM .nes (formato NES)
                // Dica: Use jogos homebrew gratuitos para evitar bloqueios
                loadGame('https://link-da-sua-rom-aqui.nes');
            }
        });
    </script>
</body>
</html>
