<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncWave Pro</title>
  <style>
:root{--bg-dark:#0a0a0a;--bg-surface:#121212;--bg-hover:#282828;--text-main:#ffffff;--text-dim:#b3b3b3;--accent:#1db954;--accent-hover:#1ed760;--sidebar-width:240px;--player-height:90px}.light-theme{--bg-dark:#f8f9fa;--bg-surface:#ffffff;--bg-hover:#f1f3f4;--text-main:#212529;--text-dim:#5f6368;--accent:#1db954}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}body,html{height:100%;background:var(--bg-dark);color:var(--text-main);overflow:hidden}#app{display:grid;grid-template-columns:var(--sidebar-width) 1fr;grid-template-rows:1fr var(--player-height);height:100vh}#sidebar{background:var(--bg-dark);padding:24px;display:flex;flex-direction:column;gap:20px;border-right:1px solid rgba(255,255,255,0.1)}.logo{font-size:1.5rem;font-weight:bold;display:flex;align-items:center;gap:10px;color:var(--accent)}nav ul{list-style:none}nav li{padding:12px;margin:4px 0;border-radius:4px;cursor:pointer;color:var(--text-dim);font-weight:600;transition:0.2s}nav li:hover,nav li.active{color:var(--text-main);background:var(--bg-hover)}#content-area{background:linear-gradient(to bottom, #222, var(--bg-surface));overflow-y:auto;position:relative}#main-header{padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;background:rgba(18,18,18,0.7);backdrop-filter:blur(10px)}.search-bar{display:flex;background:var(--bg-hover);border-radius:20px;padding:8px 16px;width:300px}.search-bar input{background:none;border:none;color:var(--text-main);width:100%;outline:none}.user-profile{display:flex;gap:15px;align-items:center}#drive-connect-btn{background:var(--accent);border:none;padding:8px 16px;border-radius:20px;color:white;cursor:pointer;font-weight:bold}.avatar{width:32px;height:32px;background:#555;border-radius:50%}#player-bar{grid-column:1 / -1;background:var(--bg-surface);border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 20px}.now-playing{display:flex;align-items:center;gap:15px;width:30%}.now-playing img{width:56px;height:56px;border-radius:4px;object-fit:cover}.track-info{display:flex;flex-direction:column}#player-title{font-weight:bold;font-size:0.9rem}#player-artist{font-size:0.8rem;color:var(--text-dim)}.player-controls{display:flex;flex-direction:column;align-items:center;gap:8px;width:40%}.control-buttons{display:flex;align-items:center;gap:20px}.icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;transition:0.2s}.icon-btn:hover{color:var(--text-main)}.main-btn{background:var(--text-main);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}.progress-container{display:flex;align-items:center;gap:10px;width:100%}.progress-container span{font-size:0.75rem;color:var(--text-dim)}#progress-track{flex:1;height:4px;background:#4f4f4f;border-radius:2px;cursor:pointer;position:relative}#progress-bar{height:100%;background:var(--accent);width:0%;border-radius:2px}.volume-controls{width:30%;display:flex;justify-content:flex-end;align-items:center;gap:10px}#volume-slider{accent-color:var(--accent);width:100px}.fade-in{animation:fadeIn 0.5s} @keyframes fadeIn{from{opacity:0}to{opacity:1}}.grid-container{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:24px;padding:32px}.card{background:var(--bg-hover);padding:16px;border-radius:8px;transition:0.3s;cursor:pointer;position:relative}.card:hover{background:#333}.card img{width:100%;aspect-ratio:1;border-radius:4px;margin-bottom:12px;box-shadow:0 8px 16px rgba(0,0,0,0.5)}.card h4{margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card p{font-size:0.8rem;color:var(--text-dim)}#modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}#modal-overlay.hidden{display:none}.modal-content{background:var(--bg-surface);padding:32px;border-radius:12px;width:400px;max-width:90%}.modal-footer{margin-top:20px;display:flex;justify-content:flex-end;gap:12px}.modal-footer button{padding:10px 20px;border-radius:20px;cursor:pointer;border:none}#modal-confirm{background:var(--accent);color:white}@media (max-width: 768px){#app{grid-template-columns:1fr}#sidebar{display:none}.search-bar{width:150px}.now-playing{width:50%}.volume-controls{display:none}}
  </style>
</head>
<body>
<div id='app' class='dark-theme'><aside id='sidebar'><div class='logo'><span class='icon-wave'></span>SyncWave</div><nav><ul><li class='active' data-view='home'><i class='icon'>🏠</i> Início</li><li data-view='library'><i class='icon'>📚</i> Biblioteca</li><li data-view='playlists'><i class='icon'>📜</i> Playlists</li><li data-view='favorites'><i class='icon'>⭐</i> Favoritos</li><li data-view='drive'><i class='icon'>☁️</i> Google Drive</li><li data-view='folders'><i class='icon'>📁</i> Pastas</li></ul></nav><div class='sidebar-footer'><button id='theme-toggle'>🌓 Modo</button></div></aside><main id='content-area'><header id='main-header'><div class='search-bar'><input type='text' id='global-search' placeholder='O que você quer ouvir?'><button id='search-btn'>🔍</button></div><div class='user-profile'><button id='drive-connect-btn'>Conectar Drive</button><div class='avatar'></div></div></header><div id='dynamic-view' class='fade-in'></div></main><div id='mini-player-anchor'></div><footer id='player-bar'><div class='now-playing'><img id='player-art' src='https://via.placeholder.com/60' alt='Capa'><div class='track-info'><span id='player-title'>Nenhuma música</span><span id='player-artist'>-</span></div><button id='btn-fav-current' class='icon-btn'>♡</button></div><div class='player-controls'><div class='control-buttons'><button id='btn-shuffle' class='icon-btn'>🔀</button><button id='btn-prev' class='icon-btn'>⏮</button><button id='btn-play-pause' class='main-btn'>▶</button><button id='btn-next' class='icon-btn'>⏭</button><button id='btn-repeat' class='icon-btn'>🔁</button></div><div class='progress-container'><span id='current-time'>0:00</span><div id='progress-track'><div id='progress-bar'></div></div><span id='total-time'>0:00</span></div></div><div class='volume-controls'><button id='btn-mute' class='icon-btn'>🔊</button><input type='range' id='volume-slider' min='0' max='100' value='80'></div></footer><div id='modal-overlay' class='hidden'><div class='modal-content'><h3 id='modal-title'>Título</h3><div id='modal-body'></div><div class='modal-footer'><button id='modal-cancel'>Cancelar</button><button id='modal-confirm'>Confirmar</button></div></div></div></div>
  <script>
const Storage = { save: (key, val) => localStorage.setItem('sw_' + key, JSON.stringify(val)), get: (key) => JSON.parse(localStorage.getItem('sw_' + key)) }; const mockTracks = [{id:1,title:'Ocean Breezes',artist:'Lofi Chill',art:'https://picsum.photos/seed/1/300',url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',genre:'Lofi'},{id:2,title:'Midnight City',artist:'Synthwave Pro',art:'https://picsum.photos/seed/2/300',url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',genre:'Electronic'},{id:3,title:'Mountain Trek',artist:'Nature Sounds',art:'https://picsum.photos/seed/3/300',url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',genre:'Ambient'}]; let state = { tracks: Storage.get('tracks') || mockTracks, playlists: Storage.get('playlists') || [{id:1,name:'Favoritos',tracks:[]}], favorites: Storage.get('favorites') || [], currentView: 'home', currentTrackIndex: -1, isPlaying: false, shuffle: false, repeat: false }; const audio = new Audio(); const elements = { view: document.getElementById('dynamic-view'), nav: document.querySelectorAll('nav li'), playBtn: document.getElementById('btn-play-pause'), progress: document.getElementById('progress-bar'), track: document.getElementById('progress-track'), curTime: document.getElementById('current-time'), totTime: document.getElementById('total-time'), vol: document.getElementById('volume-slider'), search: document.getElementById('global-search'), themeBtn: document.getElementById('theme-toggle') }; function init() { renderView('home'); attachListeners(); setInterval(updateProgress, 500); } function attachListeners() { elements.nav.forEach(li => li.addEventListener('click', () => { elements.nav.forEach(n => n.classList.remove('active')); li.classList.add('active'); renderView(li.dataset.view); })); elements.playBtn.addEventListener('click', togglePlay); elements.vol.addEventListener('input', (e) => audio.volume = e.target.value / 100); elements.track.addEventListener('click', (e) => { const rect = elements.track.getBoundingClientRect(); const pos = (e.clientX - rect.left) / rect.width; audio.currentTime = pos * audio.duration; }); elements.search.addEventListener('input', (e) => { if(state.currentView !== 'search') renderView('search'); const query = e.target.value.toLowerCase(); const filtered = state.tracks.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query)); renderTracks(filtered, 'Resultados da Pesquisa'); }); elements.themeBtn.addEventListener('click', () => { document.getElementById('app').classList.toggle('light-theme'); }); document.getElementById('btn-next').addEventListener('click', playNext); document.getElementById('btn-prev').addEventListener('click', playPrev); document.getElementById('drive-connect-btn').addEventListener('click', () => alert('Integração com Google Drive: Solicitando permissões OAuth2... (Simulado)')); } function renderView(view) { state.currentView = view; let html = ''; switch(view) { case 'home': html = `<h2>Bem-vindo de volta</h2><div class='grid-container'>${renderCards(state.tracks)}</div>`; break; case 'library': html = `<div style='padding:32px'><h2>Toda sua Música</h2><button class='main-btn' onclick='importLocal()'>+</button><div class='grid-container'>${renderCards(state.tracks)}</div></div>`; break; case 'playlists': html = `<div style='padding:32px'><h2>Suas Playlists</h2><button id='new-pl' onclick='createPlaylist()'>Criar Nova</button><div class='grid-container'>${renderPlaylists()}</div></div>`; break; case 'favorites': const favs = state.tracks.filter(t => state.favorites.includes(t.id)); html = `<div style='padding:32px'><h2>Favoritos</h2><div class='grid-container'>${renderCards(favs)}</div></div>`; break; default: html = `<div style='padding:32px'><h2>${view.charAt(0).toUpperCase() + view.slice(1)}</h2><p>Página em desenvolvimento...</p></div>`; } elements.view.innerHTML = html; } function renderCards(list) { return list.map((t, i) => `<div class='card' onclick='playTrackById(${t.id})'><img src='${t.art}'><h4>${t.title}</h4><p>${t.artist}</p></div>`).join(''); } function renderPlaylists() { return state.playlists.map(pl => `<div class='card' onclick='openPlaylist(${pl.id})'><div style='height:150px; background:#333; display:flex; align-items:center; justify-content:center; font-size:3rem'>🎵</div><h4>${pl.name}</h4><p>${pl.tracks.length} músicas</p></div>`).join(''); } function playTrackById(id) { const idx = state.tracks.findIndex(t => t.id === id); if(idx !== -1) { state.currentTrackIndex = idx; const track = state.tracks[idx]; audio.src = track.url; audio.play(); state.isPlaying = true; updatePlayerUI(track); } } function togglePlay() { if(!audio.src && state.tracks.length > 0) playTrackById(state.tracks[0].id); else if(audio.paused) { audio.play(); state.isPlaying = true; } else { audio.pause(); state.isPlaying = false; } elements.playBtn.innerHTML = state.isPlaying ? '⏸' : '▶'; } function playNext() { let next = state.currentTrackIndex + 1; if(next >= state.tracks.length) next = 0; playTrackById(state.tracks[next].id); } function playPrev() { let prev = state.currentTrackIndex - 1; if(prev < 0) prev = state.tracks.length - 1; playTrackById(state.tracks[prev].id); } function updatePlayerUI(track) { document.getElementById('player-title').innerText = track.title; document.getElementById('player-artist').innerText = track.artist; document.getElementById('player-art').src = track.art; elements.playBtn.innerHTML = '⏸'; } function updateProgress() { if(audio.duration) { const perc = (audio.currentTime / audio.duration) * 100; elements.progress.style.width = perc + '%'; elements.curTime.innerText = formatTime(audio.currentTime); elements.totTime.innerText = formatTime(audio.duration); } } function formatTime(sec) { const m = Math.floor(sec / 60); const s = Math.floor(sec % 60); return `${m}:${s < 10 ? '0' : ''}${s}`; } function createPlaylist() { const name = prompt('Nome da Playlist:'); if(name) { state.playlists.push({id: Date.now(), name, tracks: []}); Storage.save('playlists', state.playlists); renderView('playlists'); } } function importLocal() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'audio/*'; input.onchange = (e) => { const file = e.target.files[0]; const url = URL.createObjectURL(file); const newTrack = { id: Date.now(), title: file.name.replace(/\.[^/.]+$/, ''), artist: 'Local File', art: 'https://via.placeholder.com/300?text=MP3', url }; state.tracks.push(newTrack); Storage.save('tracks', state.tracks); renderView('library'); }; input.click(); } init();
  </script>
</body>
</html>
