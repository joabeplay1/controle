<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omega Factory ⚡</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <canvas id="particles"></canvas>
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text"><h1>Omega Factory</h1><p>Gerador de Software com IA</p></div>
    </div>
    <div class="flex items-center gap-3" style="display:flex;align-items:center;gap:12px">
      <button class="header-btn" onclick="downloadAsSplit()" id="dl-split-btn" disabled>⬇ HTML/CSS/JS</button>
      <div class="status-dot"><div class="dot"></div>Online</div>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div>
        <div class="section-label">⚙ Configuração</div>
        <div class="grid-2" style="margin-top:8px">
          <div><label>Provedor</label><select id="api-provider"><option value="gemini">Google Gemini</option><option value="groq">Groq</option></select></div>
          <div><label>Modelo</label><select id="model-select"></select></div>
        </div>
        <div style="margin-top:10px">
          <label>API Key</label>
          <div class="api-key-wrap">
            <input type="password" id="api-key" placeholder="Cole sua API Key aqui..."/>
            <button class="eye-btn" id="eye-btn">👁</button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      
      <div class="ai-panel">
        <div class="ai-header" onclick="togglePromptGen()">
          <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">✨ Gerador de Prompts</span>
          <span id="pg-chevron" style="color:var(--muted);font-size:11px">▼</span>
        </div>
        <div class="ai-body" id="pg-body" style="display:none">
          <textarea id="idea-input" placeholder="Descreva sua ideia..." style="min-height:60px"></textarea>
          <button class="btn-generate" id="gen-prompt-btn" onclick="generateHighQualityPrompt()" style="padding:8px">✨ Gerar Prompt</button>
        </div>
      </div>

      <div class="divider"></div>
      
      <div class="ai-panel">
        <div class="ai-header" onclick="toggleAI()">
          <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">🪄 IA Assistente</span>
          <span id="ai-chevron" style="color:var(--muted);font-size:11px">▼</span>
        </div>
        <div class="ai-body" id="ai-body" style="display:none">
          <div class="quick-grid">
            <button class="quick-btn" onclick="runImprovement('Melhore o design visual')">🎨 Design</button>
            <button class="quick-btn" onclick="runImprovement('Torne responsivo')">📱 Mobile</button>
          </div>
        </div>
      </div>
      
      <div class="divider"></div>
      
      <div>
        <div class="section-label" style="justify-content:space-between">
          <span>📁 Histórico</span>
          <button onclick="newProject()" style="background:none;border:none;color:var(--muted);cursor:pointer">＋</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>
      
      <div class="divider"></div>
      <div style="display:flex;flex-direction:column;gap:10px;flex:1">
        <div class="section-label">✏ Prompt</div>
        <textarea id="prompt" placeholder="Descreva o que você quer criar..."></textarea>
        <div class="btn-row">
          <button class="btn-generate" id="generate-btn"><span>✨</span> Gerar Projeto</button>
          <button class="btn-stop hidden" id="stop-btn">⏹ Parar</button>
        </div>
      </div>
    </aside>

    <div class="panel">
      <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('preview',this)">👁 Prévia</button>
        <button class="tab-btn" onclick="switchTab('code',this)">💻 Código</button>
      </div>
      <div class="content">
        <div class="tab-content active" id="tab-preview">
          <div class="preview-area">
            <iframe id="output-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title="Preview"></iframe>
          </div>
        </div>
        <div class="tab-content" id="tab-code">
          <pre id="code-output"></pre>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/script.js"></script>
</body>
</html>
